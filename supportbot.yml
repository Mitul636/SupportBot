#           SupportBot Configuration (supportbot.yml)

SupportBot_Version: "v26.1 DEV-2"

# -------------------------
#   General
# -------------------------

General:
  Name: "SupportBot"
  Token: "BOT_TOKEN"

  Addons:
    Enabled: true
    
# -------------------------
#  Activity
# -------------------------

Activity:
  Status: "SupportBot v8"
  Type: "Competing"
  StreamingURL: "https://www.twitch.tv/YOUR_TWITCH_NAME"

  # Available Types:
  # Playing
  # Watching
  # Listening
  # Competing
  # Streaming (URL required)

  # You can also update the activity via Discord using: /settings

# -------------------------
#  Embeds
# -------------------------

Embed:
  Colours:
    General: "#0cc559"
    Success: "#04b545"
    Error: "#d13030"
    Warn: "#fca117"

  Footer: "SupportBot | Developed by Emerald Development"

  # Use 0x<hexcode>  to change the colour of the embeds.

# -------------------------
#  Roles
# -------------------------

Roles:
  AutoRole:
    Enabled: true
    Role: "ROLE_ID"

  StaffMember:
    Staff: "ROLE_ID"
    Admin: "ROLE_ID"
    Moderator: "ROLE_ID"

  Mod:
    AllowSupportStaff: false

  # Allow Support Staff to use the /mod command. (More in detail customisation in commands.yml)

# ----------------------------
#  System Messages
# ----------------------------

Welcome: 
  Enabled: true
  Channel: "CHANNEL_ID"

Leave: 
  Enabled: true
  Channel: "CHANNEL_ID"

# ----------------------------
#  Suggestions
# ----------------------------

Suggestions:
  Mode: "Channel" # Channel or Forum
  ForumChannel: "FORUM_CHANNEL_ID" # A forum channel, disabled if mode is set to Channel.
  Channel: "CHANNEL_ID" # A text channel, disabled if mode is set to Forum.

  UpvoteEmoji: "✅"
  DownvoteEmoji: "❌"

  UpvoteTitle: "Yes"
  DownvoteTitle: "No"

  OwnSuggestion: true

  # If false this will not allow the user to vote for a suggestion they created
  # If true this will allow the user to vote for a suggestion they created

  ShowUsers: true
  
  Threads:
    Enabled: true
    Title: "Suggestion-releated Thread"
    Reason: "A thread releted to this suggestion"

  Buttons:
    Upvote: "2"
    Downvote: "2"
    RemoveVote: "4"
    RemoveVote_Title: "Remove Vote"

    # Available Button Styles
    # 1 - Blurple
    # 2 - Grey
    # 3 - Green
    # 4 - Red

  Tags:
   Created: "TAG_ID"
   Considering: "TAG_ID"
   Solved: "TAG_ID"
   Denied: "TAG_ID"

# -------------------------
#  Tickets
# -------------------------

VoiceTickets:
  Name: "%username%'s VC" 
  Category: "CATEGORY_ID"

Ticket:
  TicketType: "channels" 

  # Available TicketTypes:
  # channels - Tickets will be created as channels in the TicketChannelsCategory
  # threads - Tickets will be created as threads through the "TicketHome" channel.

  UserManagement:
    DMOnAdd: true # DM the user when they are added to the ticket
    DMOnRemove: true # DM the user when they are removed from the ticket
    DMTranscript: true # DM the user a transcript of the ticket when it is closed

  TicketHome: "1469028381638000725"

  # What is TicketHome?
  # - Channel where the Ticket creation panel is sent.
  # - Channel where ticket threads are made. (only if ticket threads is enabled above.)

  # For TicketType: channels
  TicketChannelsCategory: "CATEGORY_ID" 
  TicketChannelsCategory2: "CATEGORY_ID" # This will be used if the first category has reached the max channel limit.
  TicketArchiveCategory: "CATEGORY_ID"
  # ---

  Channel: "ticket-" # The prefix for ticket channel names
  TicketsPerUser: 100
  TicketReason: true
  # If ticket reason is set to false, It will not prompt to create a reason

  TicketSubject: "description"

  # Available TicketSubjects:
  # "description" will display the ticket reason within the channel description
  # "embed" will display the ticket reason within the ticket embed

  Timeout: 5
  # Set to true to allow all staff to access the ticket

  Close:
    StaffOnly: true
    # Set to false is anyone is able to close a ticket.

  Invites: # Invites is for ticket threads.
    StaffOnly: true

  ClaimTickets:
    Enabled: false
    Channel: "CHANNEL_ID" 
    # Channel where the ticket assignments are sent for staff to claim.
    
    ClaimAcceptTime: 120000
    # How long the assigned user has to accept the ticket before it gets re-assigned to someone else.
    # 120000 = 2 Minutes
    # 180000 = 3 Minutes
    # 240000 = 4 Minutes
    # 300000 = 5 Minutes
    # Time in Mliseconds

    ButtonTitle: "Claim Ticket"
    ButtonEmoji: "🎫"
    Button: "1"

    # Available Button Styles
    # 1 - Blurple
    # 2 - Grey
    # 3 - Green
    # 4 - Red

  ReviewSystem:
    Enabled: false                
    Channel: "CHANNEL_ID"
    UseModal: true

  Questions: # Default questions asked when a ticket is created, these are used if departments are disabled.
    Enabled: false  
    List:
      - "Please provide your account email?"
      - "What is the nature of your issue?"
      - "Have you tried resolving the issue yourself?"

  Log:
    TicketDataLog: "CHANNEL_ID"
    TickeDataTitle: "Ticket Data"
    TicketBlacklistLog: "CHANNEL_ID"

  AIMode:
    Enabled: true
    ThreadName: "Chat with SupportBot AI"
    WelcomeMessage: "Hi! I’m SupportBot AI. You can chat with me here about your issue."

# -------------------------
#  Ticket Departments
# -------------------------

  DepartmentSystem:
    Enabled: true
    Placeholder: "Choose a ticket department"
    DefaultDepartment: "general"

    Departments:
      general:
        Name: "General Support"
        Description: "Open a general support ticket"
        Emoji: "🎫"
        Category: "CATEGORY_ID"
        Role: "ROLE_ID"
        ChannelPrefix: "support-"
        DefaultPriority: "normal"
        Questions:
          - "What do you need help with?"
          - "When did the issue start?"

      purchase:
        Name: "Purchase Support"
        Description: "Get help with store purchases"
        Emoji: "💳"
        Category: "CATEGORY_ID"
        Role: "ROLE_ID"
        ChannelPrefix: "purchase-"
        DefaultPriority: "high"
        Questions:
          - "What is your order ID?"
          - "What product did you purchase?"
          - "What payment issue are you having?"

      reports:
        Name: "Player Report"
        Description: "Report a player for breaking the rules"
        Emoji: "🚨"
        Category: "CATEGORY_ID"
        Role: "ROLE_ID"
        ChannelPrefix: "report-"
        DefaultPriority: "normal"
        Questions:
          - "Who are you reporting?"
          - "What happened?"
          - "Do you have evidence?"

      appeals:
        Name: "Ban Appeals"
        Description: "Appeal a server punishment"
        Emoji: "⚖️"
        Category: "CATEGORY_ID"
        Role: "ROLE_ID"
        ChannelPrefix: "appeals-"
        DefaultPriority: "low"
        Questions:
          - "What punishment are you appealing?"
          - "Why should it be reviewed?"
          - "Anything else staff should know?"

  PrioritySystem:
    Enabled: false
    DefaultPriority: "Normal"
    AllowUsersToChooseOnOpen: true
    Priorities:
      low:
        Name: "Low"
        Emoji: "🟢"
      normal:
        Name: "Normal"
        Emoji: "🟡"
      high:
        Name: "High"
        Emoji: "🟠"
      urgent:
        Name: "Urgent"
        Emoji: "🔴"

# -------------------------
#  Buttons
# -------------------------
Buttons:
  General:
    Delete: "🗑️"
    DeleteStyle: "4"

  Voice:
    TicketDeleteText: "Delete Voice Channel"

  Tickets:
    ClaimEmoji: "🧑‍💻"
    ClaimStyle: "1"

    Unarchive: "Unarchive Ticket"
    Unarchive_Emoji: "♻️"
    Unarchive_Style: "2"

    Unlock: "Unlock Ticket"
    Unlock_Emoji: "🔓"
    Unlock_Style: "2"
    # Available Button Styles
    # 1 - Blurple
    # 2 - Grey
    # 3 - Green
    # 4 - Red

# -------------------------
#  Select Menus
# -------------------------

SelectMenus:
  Tickets:
    PanelEmoji: "⚙️"
    
    CloseEmoji: "🗑️"
    ArchiveEmoji: "♻️"
    LockEmoji: "🔐"
    RenameEmoji: "🏷️"
    VCEmoji: "🔊"

    EnableInvitesEmoji: "📤"
    DisableInvitesEmoji: "📥"

# -------------------------
#  Logging
# -------------------------

MessageDelete:
  Channel: "CHANNEL_ID"
  Colour: "#d92525"

MessageUpdate:
  Channel: "CHANNEL_ID"
  Colour: "#f2a024"

Translate:
  TranslateLog: "CHANNEL_ID"

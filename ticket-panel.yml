#
#           Ticket Creation Panel Configuration (ticket-panel.yml)

# -------------------------------
#   Ticket Panel Configuration
# -------------------------------

Panel: true

Style:
  Title: "## SupportBot Ticket Creation"
  Description: "Click on the button to file a `Ticket` and our team will try their best to assist you in the best way we can!"
  Image: "https://i.imgur.com/dejQvkg.png"
  Color: "#45b463"
  Layout: "4"

# Available Layout Styles
# "1" - Style 1 - Title & Text, Button at the top -- Image at the bottom
# "2" - Style 2 - Title & Text, Button at the bottom -- Image at the top
# "3" - Style 3 - The classic look - Title & Text at the top -- Image in the middle -- Button at the bottom
# "4" - Style 4 - Classic Embed (Title & Text, Image on right, Button at bottom)

Button:
  Text: "Create Ticket"
  Emoji: "🎫"
  Color: "2"
  CustomId: "createticket"

# Available Button Styles
# 1 - Blurple
# 2 - Grey
# 3 - Red
# 4 - Green

DepartmentMenu:
  CustomId: "ticketdepartmentselect" 
  Placeholder: "Choose a ticket department"
  DefaultDescription: "Open a support ticket"
  DefaultEmoji: "🎫"

Settings:
  Image: true
  TopTitle: true
  TopDivider: true
  BottomTitle: false
  BottomDivider: false

Messages:
  NotConfigured: "Ticket Panel is not set up. Please configure it in `/Configs/ticket-panel.yml`."
  InvalidChannel: "TicketHome channel not found. Please check your config file."
  PanelSent: "Ticket panel message has been sent!"
  PanelSentWithDepartments: "Ticket panel message with department selection has been sent!"
  SendError: "An error occurred while sending the ticket panel message."
